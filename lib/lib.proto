syntax = "proto3";

package lib;

option go_package = "/lib";

message Void {}

message Id {
  string id = 1;
}

message Message {
  int32 adr = 1;
  int32 dat = 2;
}

message Register {
  string id = 1;
  int32 length = 2;
}

message Write {
  string id = 1;
  Message msg = 2;
}

message ChanList {
  repeated Id ids = 1;
}

service Chans {
  rpc List(Void) returns(ChanList) {}
  rpc Reg(Register) returns(Void) {}
  rpc Wr(Write) returns (Void) {}
  rpc Rd(Id) returns(Message) {}
}
